<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>body { background-color: #001226; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; }</style></head>
<body>
    <div class="card p-4 shadow" style="width: 350px; background: #001F3F;">
        <h2 class="text-success text-center fw-bold">CrediFuerza</h2>
        <form action="/login" method="post">
            <input type="text" name="user" class="form-control mb-3 bg-dark text-white" placeholder="Usuario" required>
            <input type="password" name="pin" class="form-control mb-3 bg-dark text-white" placeholder="PIN" required>
            <button class="btn btn-success w-100">INGRESAR</button>
        </form>
        {% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}<div class="alert alert-danger mt-2">{{m}}</div>{% endfor %}{% endif %}{% endwith %}
    </div>
</body></html>
