{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="card bg-dark text-white border-secondary p-4 shadow">
        <h3 class="text-warning mb-4"><i class="fas fa-shield-alt me-2"></i>Auditoría de Movimientos</h3>
        <table class="table table-dark table-hover small">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Usuario</th>
                    <th>Acción Realizada</th>
                    <th>Dirección IP</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td class="text-muted">{{ log.fecha }}</td>
                    <td class="fw-bold">{{ log.usuario }}</td>
                    <td>{{ log.accion }}</td>
                    <td class="small text-muted">{{ log.ip }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
