{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="col-md-6 mx-auto">
        <div class="card bg-dark text-white border-info p-4 shadow">
            <h3 class="text-info mb-4">Mi Perfil</h3>
            <form method="POST">
                <label class="text-muted small">Nombre de Usuario</label>
                <input type="text" name="username" value="{{ u.username }}" class="form-control bg-dark text-white mb-3" required>
                
                <label class="text-muted small">PIN de Acceso</label>
                <input type="password" name="pin" value="{{ u.pin }}" class="form-control bg-dark text-white mb-3" required>
                
                <div class="p-3 bg-secondary rounded mb-3">
                    <small>Rol actual: <strong>{{ u.role.upper() }}</strong></small>
                </div>
                
                <button type="submit" class="btn btn-info w-100 fw-bold">ACTUALIZAR DATOS</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
