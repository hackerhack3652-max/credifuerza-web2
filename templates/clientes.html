{% extends 'base.html' %}
{% block content %}
<div class="card p-3 shadow">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="text-success m-0">Clientes</h4>
        <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#newC">+ Agregar</button>
    </div>
    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead><tr><th>Nombre</th><th class="text-end">Acción</th></tr></thead>
            <tbody>
                {% for c in clientes %}
                <tr>
                    <td>{{ c.nombre }}</td>
                    <td class="text-end">
                        <a href="/eliminar_cliente/{{ c.id }}" class="btn btn-outline-danger btn-sm" onclick="return confirm('¿Borrar cliente y todo su historial?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="newC" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary">
            <form method="post">
                <div class="modal-body text-white">
                    <input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre completo" required>
                    <input type="text" name="cedula" class="form-control mb-2" placeholder="Cédula">
                    <input type="text" name="tel" class="form-control mb-2" placeholder="Teléfono">
                    <input type="text" name="dir" class="form-control" placeholder="Dirección">
                </div>
                <div class="modal-footer border-0"><button class="btn btn-success w-100">Guardar</button></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
